<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Азбука профессий: Путешествие в Букваринск</title>
  
  <!-- Tailwind CSS (pre-generated, no CDN required) -->
  <link rel="stylesheet" href="tailwind.css">
  
  <!-- React and ReactDOM (local, no CDN required) -->
  <script src="js/react.production.min.js"></script>
  <script src="js/react-dom.production.min.js"></script>
  <style>
    #back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: linear-gradient(135deg, #0a7cff 0%, #43b0ff 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: system-ui, sans-serif;
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.28);
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0, 102, 255, 0.28);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }
    #back-btn:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0, 102, 255, 0.34);
    }

    body.bukvar-menu-open #back-btn {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
    }
  </style>
</head>
<body>
  <a id="back-btn" href="../">&#8592; На портал</a>
  <div id="root"></div>

  <!-- Application Scripts (pre-compiled, must run after body/root div exists) -->
  <script src="js/data.compiled.js"></script>
  <script src="js/components.compiled.js"></script>
  <script src="js/app.compiled.js"></script>
</body>
