<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Школьная библиотека</title>
  <script>
    // GitHub Pages SPA redirect — forward the path as a query param to index.html
    var seg = 1; // number of path segments in the repo name (/ELibPortal)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>Redirecting...</body>
</html>
