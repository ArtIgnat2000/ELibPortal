<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Школьная библиотека — платформа для учёбы с радостью" />
    <meta name="theme-color" content="#f59e0b" />
    <title>Школьная библиотека</title>
    <!-- GitHub Pages SPA: restore path from ?p= redirect -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle ?p= query param set by 404.html
        var search = window.location.search;
        if (search.indexOf('?p=/') === 0 || search.indexOf('p=/') !== -1) {
          var params = new URLSearchParams(search);
          var path = params.get('p');
          var query = params.get('q');
          if (path) {
            var base = window.location.pathname.replace(/\/$/, '');
            history.replaceState(null, null, base + path + (query ? '?' + query.replace(/~and~/g, '&') : '') + window.location.hash);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
